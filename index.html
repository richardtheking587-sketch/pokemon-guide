<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Guide - Elite Edition</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body class="dark-theme">
    <div class="container">
        <header class="header">
            <div class="logo-container">
                <div class="pokeball-icon"></div>
                <h1 class="logo">POKÉMON <span>GUIDE</span></h1>
            </div>
            <nav class="main-nav">
                <button class="nav-btn active" onclick="switchTab('pokemon' )">POKÉMON</button>
                <button class="nav-btn" onclick="switchTab('items')">ITENS</button>
                <button class="nav-btn" onclick="switchTab('pokeballs')">POKÉBOLAS</button>
            </nav>
        </header>

        <!-- Seção Pokémon -->
        <div id="pokemon-tab" class="tab-content active">
            <div class="filter-group">
                <h3 class="section-title" style="text-align: center; margin-bottom: 15px; color: var(--primary-red); font-family: 'Orbitron', sans-serif;">💎 FILTRAR POR RARIDADE</h3>
                <div class="rarity-filters">
                    <button class="r-btn" onclick="filterByRarity('comum')">
                        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/10.png" class="r-icon" alt="Caterpie"> COMUM
                    </button>
                    <button class="r-btn" onclick="filterByRarity('raro' )">
                        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/6.png" class="r-icon" alt="Charizard"> RARO
                    </button>
                    <button class="r-btn" onclick="filterByRarity('lendario' )">
                        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/150.png" class="r-icon" alt="Mewtwo"> LENDÁRIO
                    </button>
                    <button class="r-btn" onclick="filterByRarity('mitico' )">
                        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/493.png" class="r-icon" alt="Arceus"> MÍTICO
                    </button>
                    <button class="r-btn active" onclick="filterByRarity('all' )">TODOS</button>
                </div>
            </div>

            <div class="search-section">
                <input type="text" id="searchInput" class="search-input" placeholder="Buscar Pokémon por nome ou ID...">
                <div class="filters">
                    <select id="generationFilter" class="filter-select">
                        <option value="">GERAÇÕES</option>
                        <option value="1">Geração 1 (Kanto)</option>
                        <option value="2">Geração 2 (Johto)</option>
                        <option value="3">Geração 3 (Hoenn)</option>
                        <option value="4">Geração 4 (Sinnoh)</option>
                        <option value="5">Geração 5 (Unova)</option>
                        <option value="6">Geração 6 (Kalos)</option>
                        <option value="7">Geração 7 (Alola)</option>
                        <option value="8">Geração 8 (Galar)</option>
                        <option value="9">Geração 9 (Paldea)</option>
                    </select>
                    <select id="typeFilter" class="filter-select">
                        <option value="">TIPOS</option>
                        <option value="normal">Normal</option>
                        <option value="fire">Fogo</option>
                        <option value="water">Água</option>
                        <option value="grass">Grama</option>
                        <option value="electric">Elétrico</option>
                        <option value="ice">Gelo</option>
                        <option value="fighting">Lutador</option>
                        <option value="poison">Veneno</option>
                        <option value="ground">Terra</option>
                        <option value="flying">Voador</option>
                        <option value="psychic">Psíquico</option>
                        <option value="bug">Inseto</option>
                        <option value="rock">Pedra</option>
                        <option value="ghost">Fantasma</option>
                        <option value="dragon">Dragão</option>
                        <option value="dark">Sombrio</option>
                        <option value="steel">Aço</option>
                        <option value="fairy">Fada</option>
                    </select>
                </div>
            </div>
            <div class="pokemon-grid" id="pokemonGrid"></div>
        </div>

        <!-- Seção Itens -->
        <div id="items-tab" class="tab-content">
            <h2 class="section-title" style="text-align: center; margin-bottom: 20px; color: var(--primary-red); font-family: 'Orbitron', sans-serif;">🎒 MOCHILA DE ITENS</h2>
            <div class="item-grid" id="itemGrid"></div>
        </div>

        <!-- Seção Pokébolas -->
        <div id="pokeballs-tab" class="tab-content">
            <h2 class="section-title" style="text-align: center; margin-bottom: 20px; color: var(--primary-red); font-family: 'Orbitron', sans-serif;">🔴 COLEÇÃO DE POKÉBOLAS</h2>
            <div class="item-grid" id="pokeballGrid"></div>
        </div>

        <footer class="legal-footer">
            <div class="footer-line" style="width: 50px; height: 2px; background: var(--primary-red); margin: 0 auto 15px;"></div>
            <p>© 2024 Pokémon Guide - Richard & Daniel</p>
            <p class="disclaimer">Este site é um projeto de fã para fins de estudo. Pokémon é marca registrada da Nintendo.</p>
        </footer>

        <div id="detailModal" class="modal">
            <div class="modal-content">
                <span class="close" id="closeModalBtn">&times;</span>
                <div id="detailContent"></div>
            </div>
        </div>
    </div>
    <script src="translations.js"></script>
    <script src="script.js"></script>
</body>
</html>
