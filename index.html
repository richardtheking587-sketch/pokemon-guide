<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Guide - Elite Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* ESTILO ELITE EDITION RESTAURADO */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-dark: #050505;
            --card-bg: #111111;
            --primary-red: #ff1f1f;
            --accent-gold: #ffd700;
            --text-main: #ffffff;
            --text-dim: #888888;
            --border: #222222;
            --neon-red: 0 0 15px rgba(255, 31, 31, 0.5 );
        }
        body { 
            font-family: 'Roboto', sans-serif; 
            background-color: var(--bg-dark); 
            background-image: 
                linear-gradient(rgba(255, 31, 31, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 31, 31, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            color: var(--text-main); 
            overflow-x: hidden;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { 
            padding: 30px; text-align: center; border-bottom: 2px solid var(--primary-red);
            margin-bottom: 30px; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
        }
        .pokeball-icon {
            width: 50px; height: 50px; background: transparent; border: 3px solid #fff; border-radius: 50%;
            position: relative; cursor: pointer; box-shadow: 0 0 15px #fff, inset 0 0 10px #fff;
            animation: spin-anti-clockwise 4s linear infinite; margin: 0 auto 10px;
        }
        .pokeball-icon::before { content: ''; position: absolute; top: 50%; left: 0; width: 100%; height: 3px; background: #fff; transform: translateY(-50%); box-shadow: 0 0 10px #fff; }
        .pokeball-icon::after { content: ''; position: absolute; top: 50%; left: 50%; width: 14px; height: 14px; background: #000; border: 2px solid #fff; border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 10px #fff; }
        @keyframes spin-anti-clockwise { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 1.8em; letter-spacing: 2px; }
        .logo span { color: var(--primary-red); }
        .main-nav { display: flex; justify-content: center; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
        .nav-btn { background: none; border: none; color: #666; font-family: 'Orbitron', sans-serif; font-size: 0.8em; cursor: pointer; padding: 10px 20px; transition: 0.3s; }
        .nav-btn.active, .nav-btn:hover { color: var(--primary-red); text-shadow: var(--neon-red); }
        .pokemon-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; margin-top: 20px; }
        .pokemon-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 15px; padding: 15px; text-align: center; cursor: pointer; transition: 0.3s; }
        .pokemon-card:hover { border-color: var(--primary-red); transform: translateY(-5px); box-shadow: var(--neon-red); }
        .pokemon-image img { width: 100%; max-width: 120px; }
        .pokemon-name { margin-top: 10px; font-weight: bold; font-size: 0.9em; }
        .pokemon-id { color: var(--text-dim); font-size: 0.8em; margin-top: 5px; }
        .search-box { margin: 20px 0; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; justify-content: center; }
        #searchInput { flex: 1; min-width: 250px; background: #111; border: 1px solid #333; padding: 12px; color: white; border-radius: 8px; }
        #generationFilter { background: #111; color: white; border: 1px solid #333; padding: 12px; border-radius: 8px; cursor: pointer; }
        .action-btn { background: var(--primary-red); color: white; border: none; padding: 10px 20px; border-radius: 5px; font-family: 'Orbitron', sans-serif; cursor: pointer; transition: 0.3s; margin: 5px; }
        .action-btn:hover { background: #cc0000; box-shadow: var(--neon-red); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal.show { display: flex; }
        .modal-content { background: #0a0a0a; border: 2px solid var(--primary-red); border-radius: 20px; padding: 30px; width: 100%; max-width: 550px; position: relative; text-align: center; max-height: 90vh; overflow-y: auto; box-shadow: 0 0 30px rgba(255, 31, 31, 0.3); }
        .close { position: absolute; right: 20px; top: 15px; font-size: 30px; cursor: pointer; color: #666; transition: 0.3s; }
        .type-badge { padding: 5px 12px; border-radius: 20px; font-size: 0.8em; font-weight: bold; color: white; margin: 5px; display: inline-block; }
        .fire { background: #ff4422; } .water { background: #3399ff; } .grass { background: #77cc55; } .poison { background: #aa5599; }
        .compare-container { display: flex; align-items: center; justify-content: center; gap: 20px; margin-top: 30px; flex-wrap: wrap; }
        .compare-slot { width: 250px; height: 320px; background: var(--card-bg); border: 2px dashed #444; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; }
        .vs-circle { width: 70px; height: 70px; background: var(--primary-red); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Orbitron', sans-serif; font-weight: bold; font-size: 1.2em; box-shadow: var(--neon-red); }
        .comparison-stats { width: 100%; max-width: 700px; margin: 40px auto; background: #0a0a0a; padding: 20px; border-radius: 15px; border: 1px solid #222; }
        .stat-row { display: grid; grid-template-columns: 1fr 120px 1fr; align-items: center; margin-bottom: 12px; text-align: center; }
        .stat-val { font-weight: bold; font-family: 'Orbitron', sans-serif; font-size: 1.1em; }
        .stat-label { font-size: 0.7em; color: #666; text-transform: uppercase; }
        .winner { color: var(--accent-gold); text-shadow: 0 0 10px var(--accent-gold); }
        .region-selector-grid, .pokemon-selector-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; margin-top: 20px; }
        .selector-btn { background: #1a1a1a; border: 1px solid #333; padding: 12px; border-radius: 8px; color: white; cursor: pointer; font-family: 'Orbitron', sans-serif; font-size: 0.6em; }
        .mini-poke-btn { background: #1a1a1a; border: 1px solid #333; border-radius: 10px; padding: 8px; cursor: pointer; text-align: center; transition: 0.3s; }
        .mini-poke-btn img { width: 45px; }
        .loading { padding: 40px; text-align: center; font-family: 'Orbitron', sans-serif; color: #ff0000; }
    </style>
</head>
<body class="dark-theme">
    <div class="container">
        <header class="header">
            <div class="logo-container" onclick="switchTab('pokemon')" style="cursor:pointer">
                <div class="pokeball-icon"></div>
                <h1 class="logo">POKÉMON <span>GUIDE</span></h1>
            </div>
            <nav class="main-nav">
                <button class="nav-btn active" id="btn-pokemon" onclick="switchTab('pokemon')">POKÉMON</button>
                <button class="nav-btn" id="btn-items" onclick="switchTab('items')">ITENS</button>
                <button class="nav-btn" id="btn-pokeballs" onclick="switchTab('pokeballs')">POKÉBOLAS</button>
                <button class="nav-btn" id="btn-compare" onclick="switchTab('compare')">⚔️ COMPARAR</button>
                <button class="nav-btn" id="btn-favorites" onclick="switchTab('favorites')">⭐ FAVORITOS</button>
            </nav>
        </header>

        <main class="content">
            <section id="pokemon-tab" class="tab-content active">
                <div class="search-box">
                    <button class="action-btn" onclick="randomPokemon()">🎲 SORTEAR POKÉMON</button>
                    <input type="text" id="searchInput" placeholder="Buscar Pokémon por nome ou ID...">
                    <select id="generationFilter">
                        <option value="">TODAS AS REGIÕES</option>
                        <option value="1">Kanto</option><option value="2">Johto</option><option value="3">Hoenn</option>
                        <option value="4">Sinnoh</option><option value="5">Unova</option><option value="6">Kalos</option>
                        <option value="7">Alola</option><option value="8">Galar</option><option value="9">Paldea</option>
                    </select>
                </div>
                <div id="pokemonGrid" class="pokemon-grid"></div>
            </section>

            <section id="items-tab" class="tab-content">
                <h2 style="text-align:center; margin-bottom:20px; font-family:'Orbitron'">MOCHILA DE ITENS</h2>
                <div id="itemGrid" class="pokemon-grid"></div>
            </section>

            <section id="pokeballs-tab" class="tab-content">
                <h2 style="text-align:center; margin-bottom:20px; font-family:'Orbitron'">POKÉBOLAS</h2>
                <div id="pokeballGrid" class="pokemon-grid"></div>
            </section>

            <section id="compare-tab" class="tab-content">
                <div class="compare-container">
                    <div class="compare-slot" id="result1" onclick="openCompareSelector(1)"><span>CLIQUE PARA SELECIONAR</span></div>
                    <div class="vs-circle">VS</div>
                    <div class="compare-slot" id="result2" onclick="openCompareSelector(2)"><span>CLIQUE PARA SELECIONAR</span></div>
                </div>
                <div id="comparison-stats" class="comparison-stats"></div>
            </section>

            <section id="favorites-tab" class="tab-content">
                <h2 style="text-align:center; margin-bottom:20px; font-family:'Orbitron'">MEUS FAVORITOS</h2>
                <div id="favoritesGrid" class="pokemon-grid"></div>
            </section>
        </main>
    </div>

    <div id="detailModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <div id="detailContent"></div>
        </div>
    </div>

    <div id="compareSelectorModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeCompareSelector()">&times;</span>
            <h2 id="selectorTitle" style="font-family:'Orbitron'; margin-bottom:20px">ESCOLHA</h2>
            <div id="regionSelector" class="region-selector-grid"></div>
            <div id="pokemonSelector" class="pokemon-selector-grid" style="display:none"></div>
        </div>
    </div>

    <script src="translations.js"></script>
    <script src="script.js"></script>
</body>
</html>
