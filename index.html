<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Guide - Elite Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* ESTILO ELITE EDITION INTEGRADO */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-dark: #050505; --card-bg: #111111; --primary-red: #ff1f1f;
            --accent-gold: #ffd700; --text-main: #ffffff; --text-dim: #888888;
            --border: #222222; --neon-red: 0 0 15px rgba(255, 31, 31, 0.5 );
        }
        body { 
            font-family: 'Roboto', sans-serif; background-color: var(--bg-dark); 
            background-image: linear-gradient(rgba(255, 31, 31, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 31, 31, 0.03) 1px, transparent 1px);
            background-size: 50px 50px; color: var(--text-main); overflow-x: hidden;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { padding: 30px; text-align: center; border-bottom: 2px solid var(--primary-red); margin-bottom: 30px; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); }
        .pokeball-icon {
            width: 50px; height: 50px; background: transparent; border: 3px solid #fff; border-radius: 50%;
            position: relative; cursor: pointer; box-shadow: 0 0 15px #fff, inset 0 0 10px #fff;
            animation: spin-anti 4s linear infinite; margin: 0 auto 10px;
        }
        @keyframes spin-anti { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }
        .pokeball-icon::before { content: ''; position: absolute; top: 50%; left: 0; width: 100%; height: 3px; background: #fff; transform: translateY(-50%); }
        .pokeball-icon::after { content: ''; position: absolute; top: 50%; left: 50%; width: 14px; height: 14px; background: #000; border: 2px solid #fff; border-radius: 50%; transform: translate(-50%, -50%); }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 1.8em; letter-spacing: 2px; }
        .logo span { color: var(--primary-red); }
        .main-nav { display: flex; justify-content: center; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
        .nav-btn { background: none; border: none; color: #666; font-family: 'Orbitron', sans-serif; font-size: 0.8em; cursor: pointer; padding: 10px 20px; transition: 0.3s; }
        .nav-btn.active, .nav-btn:hover { color: var(--primary-red); text-shadow: var(--neon-red); }
        .pokemon-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; margin-top: 20px; }
        .pokemon-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 15px; padding: 15px; text-align: center; cursor: pointer; transition: 0.3s; }
        .pokemon-card:hover { border-color: var(--primary-red); transform: translateY(-5px); box-shadow: var(--neon-red); }
        .pokemon-image img { width: 100%; max-width: 120px; }
        .search-box { margin: 20px 0; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; justify-content: center; }
        #searchInput, #generationFilter { background: #111; border: 1px solid #333; padding: 12px; color: white; border-radius: 8px; }
        .action-btn { background: var(--primary-red); color: white; border: none; padding: 10px 20px; border-radius: 5px; font-family: 'Orbitron', sans-serif; cursor: pointer; transition: 0.3s; margin: 5px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal.show { display: flex; }
        .modal-content { background: #0a0a0a; border: 2px solid var(--primary-red); border-radius: 20px; padding: 30px; width: 100%; max-width: 550px; position: relative; text-align: center; max-height: 90vh; overflow-y: auto; }
        .close { position: absolute; right: 20px; top: 15px; font-size: 30px; cursor: pointer; color: #666; }
        .type-badge { padding: 5px 12px; border-radius: 20px; font-size: 0.8em; font-weight: bold; color: white; margin: 5px; display: inline-block; }
        .fire { background: #ff4422; } .water { background: #3399ff; } .grass { background: #77cc55; } .poison { background: #aa5599; }
        .compare-container { display: flex; align-items: center; justify-content: center; gap: 20px; margin-top: 30px; flex-wrap: wrap; }
        .compare-slot { width: 220px; height: 300px; background: var(--card-bg); border: 2px dashed #444; border-radius: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .vs-circle { width: 60px; height: 60px; background: var(--primary-red); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Orbitron', sans-serif; font-weight: bold; }
        .comparison-stats { width: 100%; max-width: 700px; margin: 30px auto; background: #0a0a0a; padding: 20px; border-radius: 15px; border: 1px solid #222; }
        .stat-row { display: grid; grid-template-columns: 1fr 100px 1fr; align-items: center; margin-bottom: 10px; text-align: center; }
        .winner { color: var(--accent-gold); text-shadow: 0 0 10px var(--accent-gold); }
        .region-selector-grid, .pokemon-selector-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin-top: 20px; }
        .selector-btn { background: #1a1a1a; border: 1px solid #333; padding: 10px; border-radius: 8px; color: white; cursor: pointer; font-size: 0.7em; }
        .mini-poke-btn { background: #1a1a1a; border: 1px solid #333; border-radius: 10px; padding: 5px; cursor: pointer; text-align: center; }
        .mini-poke-btn img { width: 40px; }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo-container" onclick="switchTab('pokemon')" style="cursor:pointer">
                <div class="pokeball-icon"></div>
                <h1 class="logo">POKÉMON <span>GUIDE</span></h1>
            </div>
            <nav class="main-nav">
                <button class="nav-btn active" id="btn-pokemon" onclick="switchTab('pokemon')">POKÉMON</button>
                <button class="nav-btn" id="btn-items" onclick="switchTab('items')">ITENS</button>
                <button class="nav-btn" id="btn-pokeballs" onclick="switchTab('pokeballs')">POKÉBOLAS</button>
                <button class="nav-btn" id="btn-compare" onclick="switchTab('compare')">⚔️ COMPARAR</button>
                <button class="nav-btn" id="btn-favorites" onclick="switchTab('favorites')">⭐ FAVORITOS</button>
            </nav>
        </header>

        <main class="content">
            <section id="pokemon-tab" class="tab-content active">
                <div class="search-box">
                    <button class="action-btn" onclick="randomPokemon()">🎲 SORTEAR POKÉMON</button>
                    <input type="text" id="searchInput" placeholder="Buscar Pokémon por nome ou ID...">
                    <select id="generationFilter">
                        <option value="">TODAS AS REGIÕES</option>
                        <option value="1">Kanto</option><option value="2">Johto</option><option value="3">Hoenn</option>
                        <option value="4">Sinnoh</option><option value="5">Unova</option><option value="6">Kalos</option>
                        <option value="7">Alola</option><option value="8">Galar</option><option value="9">Paldea</option>
                    </select>
                </div>
                <div id="pokemonGrid" class="pokemon-grid"></div>
            </section>

            <section id="items-tab" class="tab-content">
                <h2 style="text-align:center; margin-bottom:20px; font-family:'Orbitron'">MOCHILA DE ITENS</h2>
                <div id="itemGrid" class="pokemon-grid"></div>
            </section>

            <section id="pokeballs-tab" class="tab-content">
                <h2 style="text-align:center; margin-bottom:20px; font-family:'Orbitron'">POKÉBOLAS</h2>
                <div id="pokeballGrid" class="pokemon-grid"></div>
            </section>

            <section id="compare-tab" class="tab-content">
                <div class="compare-container">
                    <div class="compare-slot" id="result1" onclick="openCompareSelector(1)"><span>SELECIONAR</span></div>
                    <div class="vs-circle">VS</div>
                    <div class="compare-slot" id="result2" onclick="openCompareSelector(2)"><span>SELECIONAR</span></div>
                </div>
                <div id="comparison-stats" class="comparison-stats"></div>
            </section>

            <section id="favorites-tab" class="tab-content">
                <h2 style="text-align:center; margin-bottom:20px; font-family:'Orbitron'">MEUS FAVORITOS</h2>
                <div id="favoritesGrid" class="pokemon-grid"></div>
            </section>
        </main>
    </div>

    <div id="detailModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <div id="detailContent"></div>
        </div>
    </div>

    <div id="compareSelectorModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeCompareSelector()">&times;</span>
            <h2 id="selectorTitle" style="font-family:'Orbitron'; margin-bottom:20px">ESCOLHA</h2>
            <div id="regionSelector" class="region-selector-grid"></div>
            <div id="pokemonSelector" class="pokemon-selector-grid" style="display:none"></div>
        </div>
    </div>

    <script>
        /* JAVASCRIPT ELITE EDITION INTEGRADO */
        const POKE_API = 'https://pokeapi.co/api/v2';
        let allPokemon = [];
        let compareSlots = { 1: null, 2: null };
        let activeSlot = 1;

        const generationRanges = {
            1: { start: 1, end: 151, name: "Kanto" }, 2: { start: 152, end: 251, name: "Johto" },
            3: { start: 252, end: 386, name: "Hoenn" }, 4: { start: 387, end: 493, name: "Sinnoh" },
            5: { start: 494, end: 649, name: "Unova" }, 6: { start: 650, end: 721, name: "Kalos" },
            7: { start: 722, end: 809, name: "Alola" }, 8: { start: 810, end: 905, name: "Galar" },
            9: { start: 906, end: 1025, name: "Paldea" }
        };

        document.addEventListener('DOMContentLoaded', ( ) => { loadPokemon(); setupEvents(); });

        function setupEvents() {
            document.getElementById('searchInput').addEventListener('input', filterPokemon);
            document.getElementById('generationFilter').addEventListener('change', filterPokemon);
        }

        async function loadPokemon() {
            try {
                const r = await fetch(POKE_API + '/pokemon?limit=1025');
                const d = await r.json();
                allPokemon = d.results.map((p, i) => ({
                    id: i + 1, name: p.name,
                    image: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/' + (i + 1 ) + '.png',
                    shiny: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/shiny/' + (i + 1 ) + '.png'
                }));
                filterPokemon();
            } catch (e) { console.error(e); }
        }

        function filterPokemon() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const gen = document.getElementById('generationFilter').value;
            const filtered = allPokemon.filter(p => {
                const mSearch = p.name.includes(term) || String(p.id).includes(term);
                const mGen = !gen || (p.id >= generationRanges[gen].start && p.id <= generationRanges[gen].end);
                return mSearch && mGen;
            });
            document.getElementById('pokemonGrid').innerHTML = filtered.map(p => `
                <div class="pokemon-card" onclick="showDetail(${p.id})">
                    <div class="pokemon-image"><img src="${p.image}" loading="lazy"></div>
                    <div class="pokemon-name">${p.name.toUpperCase()}</div>
                    <div class="pokemon-id">#${String(p.id).padStart(4, '0')}</div>
                </div>
            `).join('');
        }

        async function showDetail(id) {
            const p = allPokemon.find(poke => poke.id === id);
            const modal = document.getElementById('detailModal');
            const content = document.getElementById('detailContent');
            modal.classList.add('show');
            content.innerHTML = '<div style="padding:40px">Sincronizando Dados...</div>';
            try {
                const res = await fetch(POKE_API + '/pokemon/' + id).then(r => r.json());
                const species = await fetch(POKE_API + '/pokemon-species/' + id).then(r => r.json());
                const evoData = await fetch(species.evolution_chain.url).then(r => r.json());
                const typeData = await fetch(POKE_API + '/type/' + res.types[0].type.name).then(r => r.json());
                
                const evolutions = []; let curr = evoData.chain;
                while(curr) {
                    const eid = curr.species.url.split('/').filter(Boolean).pop();
                    evolutions.push({ id: eid, name: curr.species.name }); curr = curr.evolves_to[0];
                }

                content.innerHTML = `
                    <img id="modal-img" src="${p.image}" style="width:180px">
                    <h2 class="pokemon-name">${p.name.toUpperCase()}</h2>
                    <div style="margin:10px">${res.types.map(t => `<span class="type-badge ${t.type.name}">${t.type.name.toUpperCase()}</span>`).join('')}</div>
                    
                    <div style="background:#222; padding:10px; border-radius:8px; margin:15px 0; font-size:0.8em; display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                        <div><strong style="color:#ff4422">FRAQUEZAS</strong>  
${typeData.damage_relations.double_damage_from.map(t => t.name.toUpperCase()).join(', ')}</div>
                        <div><strong style="color:#77cc55">VANTAGENS</strong>  
${typeData.damage_relations.double_damage_to.map(t => t.name.toUpperCase()).join(', ')}</div>
                    </div>

                    <div style="margin-top:20px;">
                        <strong style="font-size:0.8em; color:#ffd700">LINHA EVOLUTIVA</strong>
                        <div style="display:flex; justify-content:center; align-items:center; gap:10px; margin-top:10px;">
                            ${evolutions.map((evo, i) => `
                                <div onclick="showDetail(${evo.id})" style="cursor:pointer">
                                    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${evo.id}.png" style="width:50px">
                                    <div style="font-size:0.5em">${evo.name.toUpperCase( )}</div>
                                </div>
                                ${i < evolutions.length - 1 ? '➔' : ''}
                            `).join('')}
                        </div>
                    </div>

                    <div style="margin-top:20px">
                        <button class="action-btn" onclick="toggleShiny('${p.image}', '${p.shiny}')">✨ SHINY</button>
                        <button class="action-btn" onclick="closeModal()">FECHAR</button>
                    </div>
                `;
            } catch (e) { content.innerHTML = "Erro ao carregar."; }
        }

        function toggleShiny(n, s) { const img = document.getElementById('modal-img'); img.src = img.src === n ? s : n; }
        function closeModal() { document.getElementById('detailModal').classList.remove('show'); }
        function randomPokemon() { showDetail(Math.floor(Math.random() * 1025) + 1); }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tab + '-tab').classList.add('active');
            document.getElementById('btn-' + tab).classList.add('active');
            if (tab === 'items') loadItems(); if (tab === 'pokeballs') loadPokeballs();
        }

        async function loadItems() {
            const grid = document.getElementById('itemGrid'); grid.innerHTML = '...';
            const data = await fetch(POKE_API + '/item?limit=100').then(r => r.json());
            const items = await Promise.all(data.results.map(i => fetch(i.url).then(r => r.json())));
            const filtered = items.filter(i => i.category.name !== 'standard-balls' && i.category.name !== 'special-balls');
            grid.innerHTML = filtered.map(i => `<div class="pokemon-card"><img src="${i.sprites.default||''}" style="width:40px"><div>${i.name.toUpperCase()}</div></div>`).join('');
        }

        async function loadPokeballs() {
            const grid = document.getElementById('pokeballGrid'); grid.innerHTML = '...';
            const data = await fetch(POKE_API + '/item-category/34/').then(r => r.json());
            const balls = await Promise.all(data.items.map(i => fetch(i.url).then(r => r.json())));
            grid.innerHTML = balls.map(b => `<div class="pokemon-card"><img src="${b.sprites.default}" style="width:40px"><div>${b.name.toUpperCase()}</div></div>`).join('');
        }

        function openCompareSelector(slot) { activeSlot = slot; document.getElementById('compareSelectorModal').classList.add('show'); showRegions(); }
        function closeCompareSelector() { document.getElementById('compareSelectorModal').classList.remove('show'); }
        function showRegions() {
            const reg = document.getElementById('regionSelector');
            reg.innerHTML = Object.keys(generationRanges).map(gen => `<button class="selector-btn" onclick="showPokemonByRegion(${gen})">${generationRanges[gen].name}</button>`).join('');
        }
        async function showPokemonByRegion(gen) {
            document.getElementById('regionSelector').style.display = 'none';
            const pSel = document.getElementById('pokemonSelector'); pSel.style.display = 'grid';
            const pokes = allPokemon.filter(p => p.id >= generationRanges[gen].start && p.id <= generationRanges[gen].end);
            pSel.innerHTML = pokes.map(p => `<div class="mini-poke-btn" onclick="selectForCompare(${p.id})"><img src="${p.image}"></div>`).join('');
        }
        async function selectForCompare(id) {
            const p = allPokemon.find(poke => poke.id === id);
            const res = await fetch(POKE_API + '/pokemon/' + id).then(r => r.json());
            compareSlots[activeSlot] = { name: p.name, image: p.image, stats: res.stats };
            document.getElementById('result' + activeSlot).innerHTML = `<img src="${p.image}" style="width:120px">`;
            closeCompareSelector(); updateComparison();
        }
        function updateComparison() {
            if (!compareSlots[1] || !compareSlots[2]) return;
            const s1 = compareSlots[1].stats, s2 = compareSlots[2].stats;
            document.getElementById('comparison-stats').innerHTML = s1.map((s, i) => `
                <div class="stat-row">
                    <div class="stat-val ${s.base_stat > s2[i].base_stat ? 'winner' : ''}">${s.base_stat}</div>
                    <div style="font-size:0.6em; color:#666">${s.stat.name.toUpperCase()}</div>
                    <div class="stat-val ${s2[i].base_stat > s.base_stat ? 'winner' : ''}">${s2[i].base_stat}</div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
