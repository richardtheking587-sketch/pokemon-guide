<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Guide - Elite Edition</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body class="dark-theme">
    <div class="container">
        <header class="header">
            <div class="logo-container">
                <div class="pokeball-icon"></div>
                <h1 class="logo">POKÉMON <span>GUIDE</span></h1>
            </div>
            <nav class="main-nav">
                <button class="nav-btn active" id="btn-pokemon" onclick="switchTab('pokemon' )">POKÉMON</button>
                <button class="nav-btn" id="btn-items" onclick="switchTab('items')">ITENS</button>
                <button class="nav-btn" id="btn-pokeballs" onclick="switchTab('pokeballs')">POKÉBOLAS</button>
            </nav>
        </header>

        <!-- Seção Pokémon -->
        <div id="pokemon-tab" class="tab-content active">
            <div class="filter-group">
                <h3 class="section-title">💎 FILTRAR POR RARIDADE</h3>
                <div class="rarity-filters">
                    <button class="r-btn active" onclick="filterByRarity('all')">
                        <div class="all-circle">TODOS</div>
                    </button>
                    <button class="r-btn" onclick="filterByRarity('comum')">
                        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/10.png" class="r-icon">
                        <span>COMUM</span>
                    </button>
                    <button class="r-btn" onclick="filterByRarity('raro' )">
                        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/6.png" class="r-icon">
                        <span>RARO</span>
                    </button>
                    <button class="r-btn" onclick="filterByRarity('lendario' )">
                        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/150.png" class="r-icon">
                        <span>LENDÁRIO</span>
                    </button>
                    <button class="r-btn" onclick="filterByRarity('mitico' )">
                        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/493.png" class="r-icon">
                        <span>MÍTICO</span>
                    </button>
                </div>
            </div>

            <div class="search-section">
                <div class="filters-modern">
                    <input type="text" id="searchInput" class="search-input" placeholder="Buscar Pokémon por nome ou ID...">
                    <div class="select-group">
                        <select id="generationFilter" class="filter-select">
                            <option value="">GERAÇÕES</option>
                            <option value="1">Geração 1</option><option value="2">Geração 2</option>
                            <option value="3">Geração 3</option><option value="4">Geração 4</option>
                            <option value="5">Geração 5</option><option value="6">Geração 6</option>
                            <option value="7">Geração 7</option><option value="8">Geração 8</option>
                            <option value="9">Geração 9</option>
                        </select>
                        <select id="typeFilter" class="filter-select">
                            <option value="">TIPOS</option>
                            <option value="fire">Fogo</option><option value="water">Água</option>
                            <option value="grass">Grama</option><option value="electric">Elétrico</option>
                            <option value="ice">Gelo</option><option value="fighting">Lutador</option>
                            <option value="psychic">Psíquico</option><option value="dragon">Dragão</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="pokemon-grid" id="pokemonGrid"></div>
        </div>

        <!-- Seção Itens -->
        <div id="items-tab" class="tab-content">
            <h2 class="section-title">🎒 MOCHILA DE ITENS</h2>
            <div class="item-grid" id="itemGrid"></div>
        </div>

        <!-- Seção Pokébolas -->
        <div id="pokeballs-tab" class="tab-content">
            <h2 class="section-title">🔴 COLEÇÃO DE POKÉBOLAS</h2>
            <div class="item-grid" id="pokeballGrid"></div>
        </div>

        <div id="detailModal" class="modal">
            <div class="modal-content">
                <span class="close" id="closeModalBtn">&times;</span>
                <div id="detailContent"></div>
            </div>
        </div>

        <footer class="legal-footer">
            <div class="footer-line"></div>
            <p>© 2024 Pokémon Guide - Richard & Daniel</p>
            <p class="disclaimer">Projeto de fã para fins de estudo. Marcas registradas pertencem à Nintendo.</p>
        </footer>
    </div>
    <script src="translations.js"></script>
    <script src="script.js"></script>
</body>
</html>
