<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Guide - Elite Edition</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body class="dark-theme">
    <div class="container">
        <header class="header">
            <div class="logo-container">
                <div class="pokeball-icon"></div>
                <h1 class="logo">POKÉMON <span>GUIDE</span></h1>
            </div>
            <nav class="main-nav">
                <button class="nav-btn active" onclick="switchTab('pokemon' )">POKÉMON</button>
                <button class="nav-btn" onclick="switchTab('items')">ITENS</button>
                <button class="nav-btn" onclick="switchTab('pokeballs')">POKÉBOLAS</button>
            </nav>
        </header>

        <!-- Seção Pokémon -->
        <div id="pokemon-tab" class="tab-content active">
            <div class="filter-group">
                <h3 class="section-title">💎 FILTRAR POR RARIDADE</h3>
                <div class="rarity-filters">
                    <button class="r-btn" onclick="filterByRarity('comum')">
                        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/10.png" class="r-icon"> COMUM
                    </button>
                    <button class="r-btn" onclick="filterByRarity('raro' )">
                        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/6.png" class="r-icon"> RARO
                    </button>
                    <button class="r-btn" onclick="filterByRarity('lendario' )">
                        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/150.png" class="r-icon"> LENDÁRIO
                    </button>
                    <button class="r-btn" onclick="filterByRarity('mitico' )">
                        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/493.png" class="r-icon"> MÍTICO
                    </button>
                    <button class="r-btn active" onclick="filterByRarity('all' )">TODOS</button>
                </div>
            </div>

            <div class="search-section">
                <input type="text" id="searchInput" class="search-input" placeholder="Buscar Pokémon por nome ou ID...">
                <div class="filters">
                    <select id="generationFilter" class="filter-select">
                        <option value="">Todas Gerações</option>
                        <option value="1">Gen 1 (Kanto)</option>
                        <option value="2">Gen 2 (Johto)</option>
                        <option value="3">Gen 3 (Hoenn)</option>
                        <option value="4">Gen 4 (Sinnoh)</option>
                        <option value="5">Gen 5 (Unova)</option>
                        <option value="6">Gen 6 (Kalos)</option>
                        <option value="7">Gen 7 (Alola)</option>
                        <option value="8">Gen 8 (Galar)</option>
                        <option value="9">Gen 9 (Paldea)</option>
                    </select>
                    <select id="typeFilter" class="filter-select">
                        <option value="">Todos os Tipos</option>
                        <option value="fire">Fogo</option><option value="water">Água</option>
                        <option value="grass">Grama</option><option value="electric">Elétrico</option>
                        <option value="psychic">Psíquico</option><option value="dragon">Dragão</option>
                    </select>
                </div>
            </div>
            <div class="pokemon-grid" id="pokemonGrid"></div>
        </div>

        <!-- Seção Itens -->
        <div id="items-tab" class="tab-content">
            <h2 class="section-title">🎒 MOCHILA DE ITENS</h2>
            <div class="item-grid" id="itemGrid"></div>
        </div>

        <!-- Seção Pokébolas -->
        <div id="pokeballs-tab" class="tab-content">
            <h2 class="section-title">🔴 COLEÇÃO DE POKÉBOLAS</h2>
            <div class="item-grid" id="pokeballGrid"></div>
        </div>

        <footer class="legal-footer">
            <div class="footer-line"></div>
            <p>© 2024 Pokémon Guide - Richard & Daniel</p>
            <p class="disclaimer">Este site é um projeto de fã para fins de estudo. Pokémon é marca registrada da Nintendo.</p>
        </footer>

        <div id="detailModal" class="modal">
            <div class="modal-content">
                <span class="close" id="closeModalBtn">&times;</span>
                <div id="detailContent"></div>
            </div>
        </div>
    </div>
    <script src="translations.js"></script>
    <script src="script.js"></script>
</body>
</html>
